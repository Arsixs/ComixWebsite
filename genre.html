<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Genres - Manhwa Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="Comixstyle.css">
</head>
<body>
  <nav>
    <div class="logo">Comix</div>
    <div class="hamburger">

      <span></span>
      <span></span>
      <span></span>
    </div>
    <ul id="navLinks">
      <li id="adminLink" style="display:none;"><a href="admin.html">Admin Dashboard</a></li>
      <li><a href="index.html">Store</a></li>
      <li><a href="Library.html">Library</a></li>
      <li><a href="genre.html">Genres</a></li>
      <li><a href="popular.html">Popular</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><a href="cart.html" class="cart-icon">🛒 Cart <span id="cartCount">0</span></a></li>
      <li><a href="#" id="loginBtn">Login</a></li>
      <li><a href="#" id="signupBtn">Sign Up</a></li>
    </ul>
    <div id="userDisplay" style="display:none; font-weight:600; color:#00ffae;"></div>
    <a href="account.html" id="accountIcon" style="display:none; font-size: 24px; margin-left: 15px; margin-right: 15px; text-decoration: none;">👤</a>
    <button id="logoutBtn" style="display:none; margin-left:15px; padding:8px 14px; border:none; border-radius:6px; background:#00ffae; color:black; font-weight:600; cursor:pointer;">Logout</button>
  </nav>

  <!-- PAGE TITLE -->
  <section class="page-title" style="background: linear-gradient(to right, rgba(15,15,15,0.7), rgba(24,24,24,0.7)), url('https://jw-webmagazine.com/wp-content/uploads/2019/07/jw-5d1b5650099dd7.66429803.jpeg'); background-size: cover; background-position: center; padding: 60px; text-align: center;">
    <h1 style="font-size: 48px; color: #00ffae;">Browse Genres</h1>
  </section>

  <section class="genres" style="max-width: 1200px; margin: 40px auto; padding: 0 20px;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
      <h2 class="section-title" style="margin: 0;">Browse by Genre</h2>
      <button id="addGenreBtn" style="display:none; padding: 12px 24px; background: #00ffae; color: black; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 16px;">+ Add Genre</button>
    </div>
    <div class="genre-grid"></div>
  </section>

  <!-- FILTERED BOOKS SECTION -->
  <section class="filtered-books" style="max-width: 1200px; margin: 40px auto; padding: 0 20px; display: none;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
      <h2 class="section-title" style="margin: 0;">
        <span id="filteredGenreTitle">Genre Books</span>
        <button id="clearFilterBtn" style="margin-left: 20px; padding: 8px 16px; background: #444; color: white; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 14px;">Clear Filter</button>
      </h2>
    </div>
    
    <!-- Genre Filter Tags -->
    <div id="genreFilterTags" style="display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px;"></div>
    
    <!-- Filtered Book Grid -->
    <div class="filtered-book-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 25px;"></div>
  </section>

  <!-- GENRE MANAGEMENT MODAL -->
  <div id="genreModal" class="modal">
    <div class="modal-content" style="width: 450px;">
      <span class="close" onclick="closeGenreModal()">&times;</span>
      <h2 id="modalTitle" style="color: #00ffae; margin-bottom: 20px;">Add New Genre</h2>
      <form id="addGenreForm">
        <input type="hidden" id="genreEditId">
        
        <input type="text" id="genreName" placeholder="Genre Name (e.g., Action, Romance)" required style="width: 100%; padding: 12px; margin-bottom: 15px; border: none; border-radius: 8px; background: #2a2a2a; color: white;">
        
        <textarea id="genreDescription" placeholder="Short Description" required style="width: 100%; padding: 12px; margin-bottom: 15px; border: none; border-radius: 8px; background: #2a2a2a; color: white; font-family: 'Poppins', sans-serif; resize: vertical; min-height: 80px;"></textarea>
        
        <label for="genreImage" style="display: block; margin-bottom: 10px; color: #00ffae; font-weight: 600;">Select Genre Image</label>
        <input type="file" id="genreImage" accept="image/*" style="width: 100%; padding: 8px; margin-bottom: 15px; border: none; border-radius: 8px; background: #2a2a2a; color: #888;">
        
        <div id="genreImagePreview" style="margin-bottom: 15px; display: none; text-align: center;">
          <img id="genrePreviewImg" alt="Genre Preview" style="width: 100%; height: 200px; object-fit: cover; border-radius: 8px; border: 2px solid #00ffae;">
        </div>
        
        <div style="display: flex; gap: 10px;">
          <button type="submit" id="submitBtn" style="flex: 1; padding: 12px; background: #00ffae; color: black; border: none; border-radius: 8px; font-weight: 600; cursor: pointer;">Add Genre</button>
          <button type="button" onclick="closeGenreModal()" style="flex: 1; padding: 12px; background: #444; color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer;">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <!-- FOOTER -->
  <footer>
    © 2026 Comix | Genres
  </footer>

  <script src="cart.js"></script>
  <script src="script.js"></script>
</body>
</html>
     
    </div>
  </div>
</section>
