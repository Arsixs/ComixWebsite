<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping Cart - Comix</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="Comixstyle.css">
  <style>
    .cart-container {
      max-width: 1200px;
      margin: 40px auto;
      padding: 0 20px;
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 30px;
    }

    .cart-items {
      background: #1a1a1a;
      padding: 30px;
      border-radius: 10px;
    }

    .cart-item {
      display: flex;
      gap: 20px;
      padding: 20px;
      border: 1px solid #333;
      border-radius: 8px;
      margin-bottom: 15px;
      background: #0f0f0f;
    }

    .cart-item img {
      width: 80px;
      height: 120px;
      object-fit: cover;
      border-radius: 5px;
    }

    .item-details {
      flex: 1;
    }

    .item-details h3 {
      margin-bottom: 5px;
      color: #00ffae;
    }

    .item-price {
      color: #00ffae;
      font-weight: 600;
      margin: 10px 0;
    }

    .quantity-control {
      display: flex;
      gap: 10px;
      align-items: center;
      margin: 10px 0;
    }

    .quantity-control button {
      width: 30px;
      height: 30px;
      background: #00ffae;
      color: black;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: 600;
    }

    .quantity-control input {
      width: 50px;
      padding: 5px;
      text-align: center;
      background: #1a1a1a;
      color: white;
      border: 1px solid #00ffae;
      border-radius: 5px;
    }

    .remove-btn {
      background: #ff4444;
      color: white;
      border: none;
      padding: 8px 15px;
      border-radius: 5px;
      cursor: pointer;
      margin-top: 10px;
    }

    .cart-summary {
      background: #1a1a1a;
      padding: 30px;
      border-radius: 10px;
      height: fit-content;
      position: sticky;
      top: 100px;
    }

    .summary-item {
      display: flex;
      justify-content: space-between;
      margin-bottom: 15px;
      padding-bottom: 15px;
      border-bottom: 1px solid #333;
    }

    .summary-item.total {
      font-size: 20px;
      font-weight: 700;
      color: #00ffae;
      border: none;
    }

    .checkout-btn {
      width: 100%;
      padding: 15px;
      background: #00ffae;
      color: black;
      border: none;
      border-radius: 8px;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    .checkout-btn:hover {
      transform: scale(1.05);
    }

    .empty-cart {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
    }

    .empty-cart h2 {
      margin-bottom: 20px;
    }

    .continue-shopping {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 30px;
      background: #00ffae;
      color: black;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
    }
  </style>
</head>
<body>

<!-- NAVBAR -->
<nav>
  <div class="logo">Comix</div>
  <ul id="navLinks">
    <li id="adminLink" style="display:none;"><a href="admin.html">Admin Dashboard</a></li>
    <li><a href="index.html">Store</a></li>
    <li><a href="Library.html">Library</a></li> 
    <li><a href="genre.html">Genres</a></li>
    <li><a href="popular.html">Popular</a></li>
    <li><a href="contact.html">Contact</a></li>
    <li><a href="cart.html" class="cart-icon">🛒 Cart <span id="cartCount">0</span></a></li>
    <li><a href="#" id="loginBtn">Login</a></li>
    <li><a href="#" id="signupBtn">Sign Up</a></li>
  </ul>
  <div id="userDisplay" style="display:none; font-weight:600; color:#00ffae;"></div>
  <a href="account.html" id="accountIcon" style="display:none; font-size: 24px; margin-left: 15px; margin-right: 15px; text-decoration: none;">👤</a>
  <button id="logoutBtn" style="display:none; margin-left:15px; padding:8px 14px; border:none; border-radius:6px; background:#00ffae; color:black; font-weight:600; cursor:pointer;">Logout</button>
</nav>

<!-- PAGE TITLE -->
<section class="page-title" style="background: linear-gradient(to right, rgba(15,15,15,0.7), rgba(24,24,24,0.7)), url('https://images.unsplash.com/photo-1495446815901-a7297e633e8d?q=80&w=1200'); background-size: cover; background-position: center; padding: 60px; text-align: center;">
  <h1 style="font-size: 48px; color: #00ffae;">Shopping Cart</h1>
</section>

<!-- CART CONTAINER -->
<div class="cart-container">
  <!-- CART ITEMS -->
  <div class="cart-items">
    <h2>Your Items</h2>
    <div id="cartItemsContainer"></div>
  </div>

  <!-- CART SUMMARY -->
  <div class="cart-summary">
    <h3>Order Summary</h3>
    <div class="summary-item">
      <span>Subtotal:</span>
      <span id="subtotal">$0.00</span>
    </div>
    <div class="summary-item">
      <span>Shipping:</span>
      <span id="shipping">$5.00</span>
    </div>
    <div class="summary-item">
      <span>Tax:</span>
      <span id="tax">$0.00</span>
    </div>
    <div class="summary-item total">
      <span>Total:</span>
      <span id="total">$0.00</span>
    </div>
    <button class="checkout-btn">Proceed to Checkout</button>
  </div>
</div>

<!-- FOOTER -->
<footer>
  © 2026 MANHWA HUB | E-Commerce Store
</footer>

<script src="cart.js"></script>
<script src="script.js"></script>
</body>
</html>
